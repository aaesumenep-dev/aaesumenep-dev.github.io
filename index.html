<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Stock Sumenep</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%); 
        }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .loader { 
            border: 3px solid #f3f3f3; 
            border-top: 3px solid #2563eb; 
            border-radius: 50%; 
            width: 28px; 
            height: 28px; 
            animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .preview-img { 
            width: 100%; 
            height: 180px; 
            object-fit: cover; 
            background-color: #1e293b;
            transition: all 0.3s ease;
        }
        .input-pro {
            transition: all 0.2s ease;
            border: 1.5px solid #e2e8f0;
        }
        .input-pro:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }
        .btn-primary {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            transition: all 0.2s ease;
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        /* Notification Styles */
        #notificationToast {
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            transform: translateY(-120%);
        }
        #notificationToast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start p-4 pb-12 overflow-x-hidden">

    <!-- Custom Notification Toast -->
    <div id="notificationToast" class="fixed top-6 left-4 right-4 max-w-md mx-auto z-50 pointer-events-none opacity-0">
        <div class="bg-white rounded-2xl shadow-2xl border border-emerald-100 p-4 flex items-center gap-4 pointer-events-auto">
            <div class="w-10 h-10 bg-emerald-500 rounded-full flex items-center justify-center shrink-0 shadow-lg shadow-emerald-200">
                <i data-lucide="check" class="text-white w-6 h-6"></i>
            </div>
            <div class="flex-1">
                <h3 class="text-slate-900 font-bold text-sm">Berhasil Diunggah!</h3>
                <p class="text-slate-500 text-xs">Laporan PPTS telah tersimpan di Cloud.</p>
            </div>
        </div>
    </div>

    <div class="w-full max-w-md space-y-4 pt-4">
        <!-- Header Section -->
        <div class="flex items-center justify-between mb-2">
            <div>
                <h1 class="text-2xl font-bold text-slate-900 tracking-tight">LAPORAN STOCK<span class="text-blue-600">SUMENEP</span></h1>
                <p class="text-slate-500 text-xs font-medium">Sistem Pelaporan Stock</p>
            </div>
            <div class="p-2 bg-white rounded-full shadow-sm border border-slate-100">
                <i data-lucide="layers" class="w-5 h-5 text-blue-600"></i>
            </div>
        </div>

        <!-- Main Card -->
        <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/50 overflow-hidden border border-slate-100">
            
            <!-- GPS Status Bar -->
            <div id="statusContainer" class="px-4 py-2.5 bg-slate-50 border-b border-slate-100 flex items-center justify-center gap-2">
                <div id="gpsPulse" class="w-2 h-2 rounded-full bg-slate-300 animate-pulse"></div>
                <span id="statusText" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">
                    Inisialisasi GPS...
                </span>
            </div>

            <!-- Preview/Upload Area -->
            <div class="p-5 relative">
                <div id="previewContainer" class="hidden space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <div class="relative group">
                            <span class="absolute top-2 left-2 z-10 bg-black/50 backdrop-blur-md text-[9px] text-white px-2 py-0.5 rounded-full font-bold uppercase">Depan</span>
                            <img id="img1Preview" class="preview-img rounded-2xl shadow-inner border border-slate-100">
                        </div>
                        <div class="relative group">
                            <span class="absolute top-2 left-2 z-10 bg-black/50 backdrop-blur-md text-[9px] text-white px-2 py-0.5 rounded-full font-bold uppercase">Stock</span>
                            <img id="img2Preview" class="preview-img rounded-2xl shadow-inner border border-slate-100">
                        </div>
                    </div>
                </div>
                
                <div id="placeholder" class="py-12 flex flex-col items-center justify-center border-2 border-dashed border-slate-200 rounded-3xl bg-slate-50/50">
                    <div class="w-16 h-16 bg-white rounded-2xl shadow-sm flex items-center justify-center mb-4">
                        <i data-lucide="camera" class="w-8 h-8 text-slate-300"></i>
                    </div>
                    <p id="placeholderText" class="text-sm font-semibold text-slate-400 text-center px-8">Lengkapi data untuk mengaktifkan kamera</p>
                </div>

                <!-- Pro Loading Overlay -->
                <div id="loadingOverlay" class="absolute inset-0 bg-white/90 backdrop-blur-sm flex flex-col items-center justify-center hidden z-30 transition-all">
                    <div class="loader mb-4"></div>
                    <p class="text-slate-900 font-bold text-sm tracking-tight" id="loadingText">Mengunggah ke Cloud</p>
                    <p class="text-slate-400 text-[10px] mt-1 font-medium italic">Mohon tunggu sebentar...</p>
                </div>
            </div>

            <!-- Modern Form -->
            <div class="px-5 pb-6 space-y-4">
                <div class="space-y-3">
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <i data-lucide="hash" class="w-4 h-4 text-slate-400"></i>
                        </div>
                        <input type="text" id="inputData1" placeholder="Kode PPTS" class="input-pro w-full pl-10 pr-4 py-3 rounded-2xl text-sm bg-slate-50 font-semibold text-slate-700 outline-none">
                    </div>
                    
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <i data-lucide="user" class="w-4 h-4 text-slate-400"></i>
                        </div>
                        <input type="text" id="inputData2" placeholder="Nama PPTS" class="input-pro w-full pl-10 pr-4 py-3 rounded-2xl text-sm bg-slate-50 font-semibold text-slate-700 outline-none">
                    </div>

                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <i data-lucide="map" class="w-4 h-4 text-slate-400"></i>
                        </div>
                        <select id="inputData3" class="input-pro w-full pl-10 pr-4 py-3 rounded-2xl text-sm bg-slate-50 font-semibold text-slate-700 outline-none appearance-none cursor-pointer">
                            <option value="" disabled selected>Pilih Kecamatan</option>
                            <option value="Ambunten">Ambunten</option>
                            <option value="Arjasa">Arjasa</option>
                            <option value="Batang Batang">Batang Batang</option>
                            <option value="Batuan">Batuan</option>
                            <option value="Batuputih">Batuputih</option>
                            <option value="Bluto">Bluto</option>
                            <option value="Dasuk">Dasuk</option>
                            <option value="Dungkek">Dungkek</option>
                            <option value="Ganding">Ganding</option>
                            <option value="Gapura">Gapura</option>
                            <option value="Gayam">Gayam</option>
                            <option value="Gili Genting">Gili Genting</option>
                            <option value="Guluk-Guluk">Guluk-Guluk</option>
                            <option value="Kalianget">Kalianget</option>
                            <option value="Kangayan">Kangayan</option>
                            <option value="Kota Sumenep">Kota Sumenep</option>
                            <option value="Lenteng">Lenteng</option>
                            <option value="Manding">Manding</option>
                            <option value="Masalembu">Masalembu</option>
                            <option value="Nonggunong">Nonggunong</option>
                            <option value="Pasongsongan">Pasongsongan</option>
                            <option value="Pragaan">Pragaan</option>
                            <option value="Raas">Raas</option>
                            <option value="Rubaru">Rubaru</option>
                            <option value="Sapeken">Sapeken</option>
                            <option value="Saronggi">Saronggi</option>
                            <option value="Talango">Talango</option>
                        </select>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="grid grid-cols-2 gap-3 pt-2">
                    <label id="cameraLabel" for="cameraInput" class="disabled-btn flex flex-col items-center justify-center gap-1.5 py-4 rounded-2xl bg-white border-2 border-slate-100 shadow-sm text-slate-600 font-bold text-xs cursor-pointer hover:bg-slate-50 transition-all">
                        <i data-lucide="camera" class="w-6 h-6 text-blue-600"></i>
                        <span id="cameraBtnText">Foto 1</span>
                        <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden">
                    </label>

                    <button id="cloudSubmitBtn" disabled class="disabled-btn btn-primary flex flex-col items-center justify-center gap-1.5 py-4 rounded-2xl text-white font-bold text-xs shadow-lg shadow-blue-200">
                        <i data-lucide="send" class="w-6 h-6"></i>
                        <span>Kirim Data</span>
                    </button>
                </div>
                
                <button id="resetBtn" class="hidden w-full text-slate-400 hover:text-red-500 text-[10px] font-bold uppercase tracking-widest flex items-center justify-center gap-1.5 py-2 mt-2">
                    <i data-lucide="refresh-ccw" class="w-3.5 h-3.5"></i> Mulai Ulang
                </button>
            </div>
        </div>
        
        <p class="text-center text-slate-400 text-[9px] font-medium uppercase tracking-[0.2em]">© 2024 GeoKamera System • v2.0 Pro</p>
    </div>

    <script>
        lucide.createIcons();

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxRxG4PZylBhMBqY0zaGNy6jrLsdvkkjKdAe18dixl6oJfM5LEFPzE_NgBAfTK9scLf/exec";

        const cameraInput = document.getElementById('cameraInput');
        const cameraLabel = document.getElementById('cameraLabel');
        const cameraBtnText = document.getElementById('cameraBtnText');
        const img1Preview = document.getElementById('img1Preview');
        const img2Preview = document.getElementById('img2Preview');
        const cloudSubmitBtn = document.getElementById('cloudSubmitBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusText = document.getElementById('statusText');
        const gpsPulse = document.getElementById('gpsPulse');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const previewContainer = document.getElementById('previewContainer');
        const placeholder = document.getElementById('placeholder');
        const placeholderText = document.getElementById('placeholderText');
        const notificationToast = document.getElementById('notificationToast');
        
        const inputs = [
            document.getElementById('inputData1'),
            document.getElementById('inputData2'),
            document.getElementById('inputData3')
        ];

        let image1Data = null, image2Data = null, locationLocked = false, currentPos = {lat: 0, lon: 0};

        function showNotification() {
            notificationToast.classList.add('show');
            setTimeout(() => {
                notificationToast.classList.remove('show');
            }, 4000);
        }

        function validate() {
            const isReady = inputs.every(i => i.value.trim() !== "") && locationLocked;
            if (isReady) {
                cameraLabel.classList.remove('disabled-btn', 'opacity-50');
                if(!image1Data) placeholderText.textContent = "Siap mengambil foto";
            } else {
                cameraLabel.classList.add('disabled-btn', 'opacity-50');
            }
        }

        window.onload = () => {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition((pos) => {
                    locationLocked = true;
                    currentPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                    
                    gpsPulse.className = "w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]";
                    statusText.className = "text-[10px] font-bold text-green-600 uppercase tracking-widest";
                    statusText.textContent = `GPS Aktif: ${currentPos.lat.toFixed(5)}, ${currentPos.lon.toFixed(5)}`;
                    validate();
                }, () => {
                    gpsPulse.className = "w-2 h-2 rounded-full bg-red-500 animate-pulse";
                    statusText.className = "text-[10px] font-bold text-red-500 uppercase tracking-widest";
                    statusText.textContent = "GPS Error: Akses Ditolak";
                }, { enableHighAccuracy: true });
            }
            validate();
        };

        inputs.forEach(i => i.addEventListener('input', validate));

        cameraInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                if (!image1Data) {
                    image1Data = event.target.result;
                    img1Preview.src = image1Data;
                    cameraBtnText.textContent = "Foto 2";
                    resetBtn.classList.remove('hidden');
                } else if (!image2Data) {
                    image2Data = event.target.result;
                    img2Preview.src = image2Data;
                    cameraLabel.classList.add('disabled-btn', 'opacity-50');
                    cameraBtnText.textContent = "Selesai";
                    
                    cloudSubmitBtn.disabled = false;
                    cloudSubmitBtn.classList.remove('disabled-btn');
                }
                placeholder.classList.add('hidden');
                previewContainer.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
            e.target.value = '';
        });

        function resetApp() {
            image1Data = null;
            image2Data = null;
            inputs.forEach(input => input.value = "");
            img1Preview.src = "";
            img2Preview.src = "";
            previewContainer.classList.add('hidden');
            placeholder.classList.remove('hidden');
            cameraBtnText.textContent = "Foto 1";
            cameraLabel.classList.remove('disabled-btn', 'opacity-50');
            cloudSubmitBtn.disabled = true;
            cloudSubmitBtn.classList.add('disabled-btn');
            resetBtn.classList.add('hidden');
            validate();
        }

        resetBtn.addEventListener('click', () => {
            if(confirm("Bersihkan data dan ambil ulang foto?")) resetApp();
        });

        async function uploadData(base64, suffix) {
            const payload = {
                image: base64,
                suffix: suffix,
                kodePPTS: inputs[0].value,
                namaPPTS: inputs[1].value,
                kecamatan: inputs[2].value,
                lat: currentPos.lat,
                lon: currentPos.lon
            };

            return fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', 
                body: JSON.stringify(payload)
            });
        }

        cloudSubmitBtn.addEventListener('click', async () => {
            loadingOverlay.classList.remove('hidden');
            try {
                await uploadData(image1Data, "TAMPAK_DEPAN");
                await uploadData(image2Data, "STOCK_PPTS");
                
                // Menampilkan notifikasi kustom sebagai pengganti alert
                showNotification();
                
                // Memberikan sedikit jeda sebelum reset agar user sempat melihat foto mereka terhapus
                setTimeout(resetApp, 500);
            } catch (err) {
                alert("Gagal mengunggah. Periksa koneksi internet Anda.");
            } finally {
                loadingOverlay.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
